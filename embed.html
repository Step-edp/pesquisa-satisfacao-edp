<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesquisa de Satisfação — EDP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #061428;
    }

    .frame-wrap {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .frame-wrap iframe {
      width: 100%;
      height: calc(100vh + 56px);
      margin-top: -56px;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div class="frame-wrap">
    <iframe
      id="survey-frame"
      title="Pesquisa de Satisfação EDP"
      allow="clipboard-write"
    ></iframe>
  </div>
  <script src="config.js"></script>
  <script>
    if (typeof SCRIPT_URL === 'undefined' || !SCRIPT_URL) {
      document.body.innerHTML = '<p style="color:#fff;text-align:center;padding:2rem;">Pesquisa não configurada.</p>';
    } else {
      const separator = SCRIPT_URL.includes('?') ? '&' : '?';
      document.getElementById('survey-frame').src = SCRIPT_URL + separator + 'embedded=1';
    }
  </script>
</body>
</html>
